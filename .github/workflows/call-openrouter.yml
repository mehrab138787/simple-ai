name: Call OpenRouter

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'سوال شما'
        required: true

jobs:
  ask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send request to OpenRouter
        run: |
          curl -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "'"${{ github.event.inputs.question }}"'"}]
            }' > result.json

      - name: Extract answer with Python
        run: |
          python3 <<EOF
import json
try:
    with open("result.json") as f:
        data = json.load(f)
    answer = data["choices"][0]["message"]["content"]
    with open("answer.txt", "w", encoding="utf-8") as out:
        out.write(answer)
    print("OK")
except Exception as e:
    with open("answer.txt", "w", encoding="utf-8") as out:
        out.write(f"خطا: {e}")
    print("ERROR")
EOF

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "bot@github.com"
          git add answer.txt result.json
          git diff --staged --quiet || git commit -m "update answer"
          git push
