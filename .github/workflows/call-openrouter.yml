name: Call OpenRouter

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'سوال شما'
        required: true

jobs:
  ask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Send request to OpenRouter
        run: |
          curl -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "'"${{ github.event.inputs.question }}"'"}]
            }' > result.json
          
          python3 -c '
import json
with open("result.json") as f:
    data = json.load(f)
    answer = data["choices"][0]["message"]["content"]
    with open("answer.txt", "w", encoding="utf-8") as out:
        out.write(answer)
'

      - name: Save answer
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add answer.txt result.json
          git diff --staged --quiet || git commit -m "Update answer: $(date)"
          git push origin main
